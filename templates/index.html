<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedAssist AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- DARK MODE -->
<div class="top-actions">
    <button id="darkToggle">🌙</button>
</div>

<!-- HERO -->
<section class="hero fade-in">
    <h1>🩺 MedAssist AI</h1>
    <p>Your Community Health Companion</p>
</section>

<!-- FORM -->
<div class="container slide-up">
    <form id="healthForm" class="card form-card">

        <h2>Describe Your Health Issue</h2>

        <input type="text" name="city" placeholder="Enter your city (optional)">

        <textarea name="symptoms" placeholder="Describe your symptoms..." required></textarea>

        <select name="language">
            <option value="en-US">English</option>
            <option value="hi-IN">Hindi</option>
            <option value="te-IN">Telugu</option>
            <option value="ta-IN">Tamil</option>
        </select>

        <button type="submit">🔍 Get Guidance</button>
    </form>
</div>

<!-- FLOATING CHAT -->
<div id="chat-bubble">💬</div>

<div id="chat-box">
    <div class="chat-header">MedAssist Assistant</div>
    <div class="chat-body" id="chat-body">
        <div class="bot-msg">
            Hi 👋  
            Ask me how to use this site or understand results.
        </div>
    </div>
    <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Ask something...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<!-- GPS + FORM HANDLER -->
<script>
function getUserLocation(callback) {
    if (!navigator.geolocation) {
        callback(null);
        return;
    }
    navigator.geolocation.getCurrentPosition(
        pos => callback({
            lat: pos.coords.latitude,
            lon: pos.coords.longitude
        }),
        () => callback(null)
    );
}

document.getElementById("healthForm").addEventListener("submit", function (e) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);

    getUserLocation(function (location) {
        if (location) {
            formData.append("lat", location.lat);
            formData.append("lon", location.lon);
        }

        fetch("/analyze", {
            method: "POST",
            body: formData
        })
        .then(res => res.text())
        .then(html => document.body.innerHTML = html);
    });
});
</script>

<script src="{{ url_for('static', filename='assistant.js') }}"></script>
</body>
</html>
