<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedAssist AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

*{
box-sizing:border-box;
}

body{

font-family: "Segoe UI", Arial, sans-serif;

margin:0;

min-height:100vh;

display:flex;

flex-direction:column;

align-items:center;

background: linear-gradient(-45deg,#eaf3ff,#f4f9ff,#eef5ff,#e9f2ff);

background-size:400% 400%;

animation: gradientBG 12s ease infinite;

}

@keyframes gradientBG{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}


/* HERO */

.hero{

text-align:center;

margin-top:90px;

}

.hero h1{

font-size:42px;

margin-bottom:8px;

font-weight:700;

}

.hero p{

color:#5c6b7a;

font-size:16px;

}


/* CARD */

.container{

margin-top:40px;

width:100%;

display:flex;

justify-content:center;

}

.form-card{

width:650px;

padding:35px;

border-radius:20px;

background:rgba(255,255,255,0.7);

backdrop-filter:blur(15px);

box-shadow:0 20px 50px rgba(0,0,0,0.08);

}

/* INPUTS */

input, textarea, select{

width:100%;

padding:12px;

border-radius:10px;

border:1px solid #ddd;

font-size:14px;

}

textarea{

height:80px;

resize:none;

}

/* BUTTON */

button{

background:#2b7cff;

border:none;

color:white;

padding:12px 20px;

border-radius:10px;

font-weight:600;

cursor:pointer;

transition:.25s;

}

button:hover{

background:#1d63d6;

transform:translateY(-1px);

}


/* SYMPTOM SUGGESTIONS */

.suggestions{

margin-top:12px;

display:flex;

flex-wrap:wrap;

gap:8px;

}

.chip{

background:#eef3ff;

padding:6px 12px;

border-radius:20px;

font-size:13px;

cursor:pointer;

}

.chip:hover{

background:#dfe9ff;

}


/* AUTOCOMPLETE */

.autocomplete-list{

position:absolute;

background:white;

border:1px solid #ddd;

width:100%;

max-height:180px;

overflow-y:auto;

border-radius:8px;

z-index:999;

}

.autocomplete-item{

padding:10px;

cursor:pointer;

}

.autocomplete-item:hover{

background:#f2f6ff;

}

.input-wrapper{

position:relative;

margin-bottom:12px;

}


/* CHAT BUTTON */

#chat-bubble{

position:fixed;

bottom:30px;

right:30px;

background:#2b7cff;

color:white;

width:60px;

height:60px;

display:flex;

align-items:center;

justify-content:center;

border-radius:50%;

font-size:22px;

cursor:pointer;

box-shadow:0 10px 25px rgba(0,0,0,0.25);

}


/* CHAT BOX */

#chat-box{

position:fixed;

bottom:105px;

right:30px;

width:320px;

height:420px;

background:white;

border-radius:16px;

box-shadow:0 10px 35px rgba(0,0,0,0.2);

display:none;

flex-direction:column;

overflow:hidden;

}

.chat-header{

background:#2b7cff;

color:white;

padding:12px;

font-weight:600;

}

.chat-body{

flex:1;

padding:10px;

overflow-y:auto;

}

.bot-msg{

background:#eef2ff;

padding:8px 12px;

border-radius:10px;

margin-bottom:8px;

max-width:85%;

}

.user-msg{

background:#2b7cff;

color:white;

padding:8px 12px;

border-radius:10px;

margin-bottom:8px;

margin-left:auto;

max-width:85%;

}

.chat-input{

display:flex;

border-top:1px solid #eee;

}

.chat-input input{

flex:1;

border:none;

padding:10px;

}

.chat-input button{

border-radius:0;

}


/* LOADING */

.loader{

display:none;

text-align:center;

margin-top:15px;

}

.loader span{

width:8px;

height:8px;

margin:2px;

background:#2b7cff;

border-radius:50%;

display:inline-block;

animation:bounce 1s infinite;

}

.loader span:nth-child(2){animation-delay:.2s}
.loader span:nth-child(3){animation-delay:.4s}

@keyframes bounce{

0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}

}

</style>
</head>

<body>


<div class="hero">

<h1>🩺 MedAssist AI</h1>

<p>Your Intelligent Community Health Assistant</p>

</div>


<div class="container">

<form id="healthForm" class="form-card">

<h2>Describe Your Health Issue</h2>

<div class="input-wrapper">

<input type="text" id="cityInput" name="city" placeholder="Enter your city">

<div id="autocompleteResults" class="autocomplete-list"></div>

</div>

<textarea id="symptomBox" name="symptoms" placeholder="Describe your symptoms..." required></textarea>


<div class="suggestions">

<div class="chip">Headache</div>

<div class="chip">Fever</div>

<div class="chip">Cough</div>

<div class="chip">Stomach Pain</div>

<div class="chip">Fatigue</div>

</div>

<br>

<select name="language">

<option value="en-US">English</option>

<option value="hi-IN">Hindi</option>

<option value="te-IN">Telugu</option>

<option value="ta-IN">Tamil</option>

</select>

<button type="submit">🔍 Get Guidance</button>

<div class="loader" id="loader">

<span></span><span></span><span></span>

</div>

</form>

</div>


<div id="chat-bubble">💬</div>

<div id="chat-box">

<div class="chat-header">MedAssist Assistant</div>

<div class="chat-body" id="chat-body">

<div class="bot-msg">

Hi 👋 I can help explain symptoms or guide you through this website.

</div>

</div>

<div class="chat-input">

<input type="text" id="chat-input" placeholder="Ask something...">

<button onclick="sendMessage()">➤</button>

</div>

</div>


<script src="{{ url_for('static', filename='assistant.js') }}"></script>

<script>

document.querySelectorAll(".chip").forEach(chip=>{

chip.onclick=()=>{

document.getElementById("symptomBox").value=chip.innerText

}

})


document.getElementById("healthForm").addEventListener("submit",function(){

document.getElementById("loader").style.display="block"

})

</script>

</body>
</html>
